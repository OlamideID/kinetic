<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kinetic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@300;400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HUD -->
    <div id="hud">
        <div class="wordmark">Kinetic<span>.</span></div>
        <div class="controls">
            <button id="themeToggle" title="Toggle theme">☀️</button>
            <div class="chip">
                <div class="pip" id="wsPip"></div><span id="wsLabel">connecting</span>
            </div>
            <div class="chip">
                <div class="pip" id="handPip"></div><span id="handLabel">no hand</span>
            </div>
        </div>
    </div>

    <!-- Status bar -->
    <div id="statusBar">
        <div id="gesture">— waiting —</div>
        <div id="cardCount"></div>
    </div>

    <!-- Offline -->
    <div id="offline">
        <h2>No tracker signal</h2>
        <p>Run hand_tracker.py · mouse + click also works</p>
    </div>

    <!-- Cursor -->
    <div id="cursor"></div>

    <!-- Stage -->
    <div id="stage"></div>

    <script src="script.js"></script>
</body>

</html>
